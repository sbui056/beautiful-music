<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Music — Neural Bach Chorale Generation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #1a1a1f;
            --surface: #232329;
            --border: rgba(180, 160, 120, 0.12);
            --border-hover: rgba(180, 160, 120, 0.22);
            --text: #e6dfd2;
            --text-dim: #9a9488;
            --text-faint: #5e584e;
            --accent: #b08d57;
            --accent-glow: rgba(176, 141, 87, 0.15);
            --font-serif: 'Cormorant Garamond', Georgia, serif;
            --font-sans: 'DM Sans', system-ui, sans-serif;
        }

        html {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            padding: 3rem 1.5rem;
        }

        .container {
            max-width: 1060px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeUp 0.7s ease both;
        }

        header h1 {
            font-family: var(--font-serif);
            font-weight: 300;
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            letter-spacing: 0.02em;
            line-height: 1.1;
            margin-bottom: 0.75rem;
        }

        header p {
            font-weight: 300;
            font-size: 0.95rem;
            color: var(--text-dim);
            letter-spacing: 0.04em;
        }

        header .divider {
            width: 60px;
            height: 1px;
            background: var(--border-hover);
            margin: 1.5rem auto 0;
        }

        .players {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 3rem;
        }

        .player-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.75rem;
            transition: border-color 0.3s ease;
            animation: fadeUp 0.7s ease both;
        }

        .player-card:nth-child(1) { animation-delay: 0.1s; }
        .player-card:nth-child(2) { animation-delay: 0.2s; }
        .player-card:hover { border-color: var(--border-hover); }

        .player-title {
            font-family: var(--font-serif);
            font-weight: 400;
            font-size: 1.25rem;
            margin-bottom: 0.35rem;
        }

        .player-desc {
            font-size: 0.82rem;
            font-weight: 300;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .piano-roll {
            width: 100%;
            height: 130px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.25);
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .piano-roll canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 0.875rem;
        }

        .play-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid var(--accent);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.25s ease;
        }

        .play-btn:hover {
            background: var(--accent-glow);
            box-shadow: 0 0 0 4px rgba(176, 141, 87, 0.06);
        }

        .play-btn.playing {
            background: var(--accent);
            color: var(--bg);
        }

        .play-btn.loading {
            opacity: 0.5;
            cursor: wait;
        }

        .play-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .play-btn .icon-pause { display: none; }
        .play-btn.playing .icon-play { display: none; }
        .play-btn.playing .icon-pause { display: block; }

        .player-progress {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .progress-track {
            width: 100%;
            height: 14px;
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .progress-track .track-bg {
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }

        .progress-fill {
            position: absolute;
            left: 0;
            height: 3px;
            width: 0%;
            background: var(--accent);
            border-radius: 2px;
            pointer-events: none;
        }

        .progress-thumb {
            position: absolute;
            left: 0%;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .progress-track:hover .progress-thumb,
        .progress-track.dragging .progress-thumb {
            opacity: 1;
        }

        .player-time {
            font-size: 0.7rem;
            color: var(--text-faint);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.03em;
        }

        .notebook-section {
            animation: fadeUp 0.7s ease 0.3s both;
        }

        .notebook-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .notebook-header h2 {
            font-family: var(--font-serif);
            font-weight: 400;
            font-size: 1.1rem;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .notebook-header .line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .notebook-frame {
            width: 100%;
            height: 85vh;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #ffffff;
            overflow: hidden;
        }

        .notebook-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            margin-top: 2.5rem;
            text-align: center;
            animation: fadeUp 0.7s ease 0.4s both;
        }

        footer a {
            color: var(--text-faint);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.03em;
            transition: color 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        footer a:hover { color: var(--text-dim); }

        footer a svg {
            width: 15px;
            height: 15px;
            fill: currentColor;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            body { padding: 2rem 1rem; }
            .players { grid-template-columns: 1fr; }
            .player-card { padding: 1.5rem; }
            .notebook-frame { height: 70vh; border-radius: 10px; }
        }
    </style>
</head>

    <script>
        function fmt(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return m + ':' + String(s).padStart(2, '0');
        }

        var VOICE_COLORS = ['#d4a85c', '#c97b6b', '#5ba898', '#6b8cc9'];
        var VOICE_ACTIVE  = ['#f0c670', '#e89585', '#72ccb4', '#85a8e0'];

        class PianoRoll {
            constructor(canvas, notes, audio) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.notes = notes;
                this.audio = audio;
                this.window = 12;
                this.pitchMin = Math.min.apply(null, notes.map(function(n){ return n.p; })) - 1;
                this.pitchMax = Math.max.apply(null, notes.map(function(n){ return n.p; })) + 1;
                this.pitchRange = this.pitchMax - this.pitchMin;
                this.rafId = null;
                this.resize();
                window.addEventListener('resize', this.resize.bind(this));
                this.draw(0);
            }

            resize() {
                var rect = this.canvas.parentElement.getBoundingClientRect();
                var dpr = window.devicePixelRatio || 1;
                this.w = rect.width;
                this.h = rect.height;
                this.canvas.width = this.w * dpr;
                this.canvas.height = this.h * dpr;
                this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                this.draw(this.audio.currentTime || 0);
            }

            start() {
                if (this.rafId) return;
                var self = this;
                function tick() {
                    self.draw(self.audio.currentTime);
                    self.rafId = requestAnimationFrame(tick);
                }
                self.rafId = requestAnimationFrame(tick);
            }

            stop() {
                if (this.rafId) { cancelAnimationFrame(this.rafId); this.rafId = null; }
            }

            draw(currentTime) {
                var ctx = this.ctx, w = this.w, h = this.h;
                var playheadX = w * 0.12;
                var startTime = currentTime - (playheadX / w) * this.window;
                var endTime = startTime + this.window;
                var noteH = Math.max(h / this.pitchRange * 0.75, 2);
                var radius = Math.min(noteH / 2, 3);

                ctx.clearRect(0, 0, w, h);

                for (var i = 0; i < this.notes.length; i++) {
                    var n = this.notes[i];
                    if (n.e < startTime || n.s > endTime) continue;

                    var x = ((n.s - startTime) / this.window) * w;
                    var xEnd = ((n.e - startTime) / this.window) * w;
                    var y = h - ((n.p - this.pitchMin) / this.pitchRange) * h - noteH / 2;
                    var nw = Math.max(xEnd - x, 2);
                    var active = currentTime >= n.s && currentTime < n.e;

                    ctx.fillStyle = active ? VOICE_ACTIVE[n.v] : VOICE_COLORS[n.v];
                    ctx.globalAlpha = active ? 1.0 : 0.45;
                    ctx.beginPath();
                    ctx.roundRect(x, y, nw, noteH, radius);
                    ctx.fill();

                    if (active) {
                        ctx.globalAlpha = 0.25;
                        ctx.shadowColor = VOICE_ACTIVE[n.v];
                        ctx.shadowBlur = 10;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
                ctx.globalAlpha = 1.0;

                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(playheadX, 0);
                ctx.lineTo(playheadX, h);
                ctx.stroke();
            }
        }

        var allPlayers = [];

        document.querySelectorAll('.player-card').forEach(function(card) {
            var audio = new Audio(card.dataset.src);
            var btn = card.querySelector('.play-btn');
            var track = card.querySelector('.progress-track');
            var fill = card.querySelector('.progress-fill');
            var thumb = card.querySelector('.progress-thumb');
            var timeEl = card.querySelector('.player-time');
            var canvas = card.querySelector('.piano-roll canvas');
            var notes = JSON.parse(document.getElementById(card.dataset.notes).textContent);
            var roll = new PianoRoll(canvas, notes, audio);
            var dragging = false;

            function setProgress(pct) {
                fill.style.width = pct + '%';
                thumb.style.left = pct + '%';
            }

            function seekFromEvent(e) {
                var rect = track.getBoundingClientRect();
                var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                audio.currentTime = pct * audio.duration;
                setProgress(pct * 100);
                timeEl.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
                roll.draw(audio.currentTime);
            }

            audio.addEventListener('loadedmetadata', function() {
                timeEl.textContent = '0:00 / ' + fmt(audio.duration);
            });

            audio.addEventListener('timeupdate', function() {
                if (dragging) return;
                var pct = audio.currentTime / audio.duration * 100;
                setProgress(pct);
                timeEl.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
            });

            audio.addEventListener('ended', function() {
                btn.classList.remove('playing');
                setProgress(0);
                audio.currentTime = 0;
                timeEl.textContent = '0:00 / ' + fmt(audio.duration);
                roll.stop();
                roll.draw(0);
            });

            track.addEventListener('mousedown', function(e) {
                dragging = true;
                track.classList.add('dragging');
                seekFromEvent(e);
            });

            window.addEventListener('mousemove', function(e) {
                if (!dragging) return;
                seekFromEvent(e);
            });

            window.addEventListener('mouseup', function() {
                if (!dragging) return;
                dragging = false;
                track.classList.remove('dragging');
            });

            btn.addEventListener('click', function() {
                if (audio.paused) {
                    allPlayers.forEach(function(p) {
                        if (p.audio !== audio && !p.audio.paused) {
                            p.audio.pause();
                            p.audio.currentTime = 0;
                            p.btn.classList.remove('playing');
                            p.fill.style.width = '0%';
                            p.thumb.style.left = '0%';
                            p.timeEl.textContent = '0:00 / ' + fmt(p.audio.duration);
                            p.roll.stop();
                            p.roll.draw(0);
                        }
                    });
                    audio.play();
                    btn.classList.add('playing');
                    roll.start();
                } else {
                    audio.pause();
                    audio.currentTime = 0;
                    btn.classList.remove('playing');
                    setProgress(0);
                    timeEl.textContent = '0:00 / ' + fmt(audio.duration);
                    roll.stop();
                    roll.draw(0);
                }
            });

            allPlayers.push({ audio: audio, btn: btn, fill: fill, thumb: thumb, timeEl: timeEl, roll: roll });
        });
    </script>
